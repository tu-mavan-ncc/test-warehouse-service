version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: warehouse-postgres
    environment:
      - POSTGRES_DB=warehouse_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warehouse_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - warehouse-network

  warehouse-service:
    build: .
    container_name: warehouse-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/warehouse_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - warehouse-network

networks:
  warehouse-network:
    driver: bridge
